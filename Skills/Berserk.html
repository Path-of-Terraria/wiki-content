<p><strong>Berserk</strong> is a melee buff skill that increases melee damage while making incoming hits more dangerous.</p>
<p><strong>Description:</strong> Deal 150% more melee damage while taking 5 more damage each time hit.</p>
<p><strong>Requires:</strong> A melee weapon held.</p>
<p><strong>Tags:</strong> Melee, Buff.</p>
