<p><strong>Molten Shield</strong> is a melee buff skill unlocked through the Molten Shield item affix.</p>
<p><strong>Description:</strong> Gain a temporary health buffer that stops 75% of incoming damage until broken.</p>
<p><strong>Requires:</strong> A melee weapon held and at least one Molten Shield affix level.</p>
<p><strong>Tags:</strong> Melee, Buff.</p>
